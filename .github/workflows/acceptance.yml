name: Acceptance

# 针对真实 NetBox（容器）跑 nbx-guard 端到端验收。
# 较重（需拉取 NetBox 镜像并执行数据库迁移），因此独立于快速 CI：
# 仅在手动触发、每周定时，或改动 guard 逻辑/验收脚本时运行。
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1" # 每周一 03:00 UTC，检测 NetBox API 漂移
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.zig"
      - "build.zig.zon"
      - "acceptance/**"
      - ".github/workflows/acceptance.yml"
  pull_request:
    paths:
      - "src/**"
      - "build.zig"
      - "build.zig.zon"
      - "acceptance/**"
      - ".github/workflows/acceptance.yml"

permissions:
  contents: read

concurrency:
  group: acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  netbox-acceptance:
    name: NetBox acceptance
    runs-on: ubuntu-latest # 需要 Docker（macOS runner 没有 Docker）
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Show toolchain
        run: |
          zig version
          docker version
          docker compose version
          jq --version

      # 缓存 NetBox/postgres/redis 镜像，避免每次 CI 都从 Docker Hub 重新拉取约 1.5GB
      # （并规避匿名拉取限流）。键随 docker-compose.yml 变化失效，镜像 tag 一改即自动重建。
      - name: Cache NetBox stack images
        id: stack-images
        uses: actions/cache@v4
        with:
          path: /tmp/nbx-acc-images
          key: nbx-acc-images-${{ hashFiles('acceptance/docker-compose.yml') }}

      - name: Load cached stack images
        if: steps.stack-images.outputs.cache-hit == 'true'
        run: docker load -i /tmp/nbx-acc-images/stack.tar

      - name: Pull & cache stack images
        if: steps.stack-images.outputs.cache-hit != 'true'
        run: |
          docker compose -f acceptance/docker-compose.yml pull
          mkdir -p /tmp/nbx-acc-images
          # shellcheck disable=SC2046
          docker save -o /tmp/nbx-acc-images/stack.tar \
            $(docker compose -f acceptance/docker-compose.yml config --images | sort -u)

      - name: Run NetBox acceptance
        run: bash acceptance/run.sh
