name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# mlugg/setup-zig 上游暂未迁移到 Node 24（其 action.yml 仍声明 node20）。
# 在它发布 node24 版本前，用 GitHub 官方过渡开关让该 action 以 Node 24 运行，
# 消除弃用告警；本仓库其余 action 均已升级到 node24，对它们无副作用。
# 待 setup-zig 升级后删除此 env 并把它固定到新版本。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build --summary all

      - name: Test
        run: zig build test --summary all

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig fmt --check build.zig src
