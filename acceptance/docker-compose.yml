# 一次性 NetBox 验收栈：postgres + redis + netbox。
# 仅用于本地验收，跑完即由 acceptance/run.sh 通过 `down -v` 销毁，可重复执行。
# NetBox 固定到 4.5.1（netbox-docker 3.4.2，与生产环境一致）。NetBox 4.5 默认签发
# v2 API Token（凭据形如 `nbt_<key>.<secret>`，以 `Bearer` 方案鉴权），需要配置
# API_TOKEN_PEPPERS 才能创建/校验。run.sh 会在就绪后植入一个确定性的 v2 Token，
# nbx-guard 依据 `nbt_` 前缀自动改用 Bearer 方案（同时仍兼容旧版 v1 `Token` 方案）。

services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -U netbox -d netbox"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: docker.io/redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  netbox:
    image: docker.io/netboxcommunity/netbox:v4.5.1-3.4.2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库
      DB_HOST: postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: netbox
      # Redis：tasks 用 db0，cache 用 db1，同一实例
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DATABASE: "0"
      REDIS_CACHE_HOST: redis
      REDIS_CACHE_PORT: "6379"
      REDIS_CACHE_DATABASE: "1"
      # NetBox 自身
      SECRET_KEY: "nbx-guard-acceptance-secret-key-please-do-not-reuse-0123456789"
      # v2 Token 的 HMAC pepper（NetBox 4.5 创建/校验 v2 Token 必需，至少 50 字符）
      API_TOKEN_PEPPER_1: "nbx-guard-acceptance-api-token-pepper-do-not-reuse-0123456789"
      ALLOWED_HOSTS: "*"
      # 自动创建超级用户（admin）。NetBox 4.5 的 v2 Token 模型里 key 字段为
      # varchar(12)，而 netbox-docker 仍按旧式把 SUPERUSER_API_TOKEN 当作 key 写入，
      # 因此这里必须用 ≤12 字符的占位值，仅为了让入口脚本顺利建出 admin（该 Token
      # 不会被使用）；真正用于验收的确定性 v2 Token 由 run.sh 就绪后植入。
      SKIP_SUPERUSER: "false"
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@example.com
      SUPERUSER_PASSWORD: admin
      SUPERUSER_API_TOKEN: "nbxseedtok01"
      # 验收无需后台任务，加快冷启动
      HOUSEKEEPING_INTERVAL: "0"
    ports:
      - "${NBX_NETBOX_PORT:-8000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
