[book]
title = "nbx-guard"
description = "面向 agent 的 NetBox 安全变更网关，使用 Zig 实现。"
authors = ["terateams"]
language = "zh"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/terateams/nbx-guard"
edit-url-template = "https://github.com/terateams/nbx-guard/edit/main/docs/{path}"
site-url = "/book/"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
limit-results = 20

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
